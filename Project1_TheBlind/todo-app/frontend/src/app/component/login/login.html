<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    
    <!-- Username Field -->
    <div class="form-group">
      <label for="username">Username</label>
      <input 
        id="username" 
        type="text" 
        formControlName="username" 
        [ngClass]="{ 'is-invalid': isSubmitted && f['username'].errors }" />
      <div *ngIf="isSubmitted && f['username'].errors" class="error-msg">
        <small *ngIf="f['username'].errors['required']">Username is required.</small>
        <small *ngIf="f['username'].errors['minlength']">Minimum 5 characters required.</small>
      </div>
    </div>
    
    <!-- Password Field -->
    <div class="form-group">
      <label for="password">Password</label>
      <input 
        id="password" 
        type="password" 
        formControlName="password" 
        [ngClass]="{ 'is-invalid': isSubmitted && f['password'].errors }" />
      <div *ngIf="isSubmitted && f['password'].errors" class="error-msg">
        <small *ngIf="f['password'].errors['required']">Password is required.</small>
        <small *ngIf="f['password'].errors['minlength']">Password must contain at least 5 characters.</small>
      </div>
    </div>

    <!-- Form Submit Action Button -->
    <button type="submit" class="btn-submit" (click)="onSubmit()">Login</button>
  </form>
</div>
