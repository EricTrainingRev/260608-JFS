<!-- You can treat your HTML template like regular HTML -->
<h1>You can do this</h1>
<!-- 
  But the benefit of Angular is we get more capabilities from our HTML
  templates. We can reference any data from our component inside of our
  elements through interpolation. Use double curly brackets to indicate you
  are referencing something from your component (can be a field or a function)
  and then provide that something in the brackets. In the example below, the
  value stored in the message signal is being referenced and will render in
  the viewport of the browser
-->
<h1>{{ message() }}</h1>
