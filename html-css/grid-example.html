<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Example</title>
    <style>
        .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        grid-template-areas:
            "Header Header Header"
            "side-bar main main"
            "side-bar main main"
            "footer footer footer";
        gap: 16px;
        }

        .Header {
        grid-area: Header;
        }

        .footer {
        grid-area: footer;
        }

        .side-bar {
        grid-area: side-bar;
        }

        .main {
        grid-area: main;
        }

        p {
        text-align: center;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="Header">
            <p>this is in the header area</p>
        </div>
        <div class="footer">
            <p>this is in the footer area</p>
        </div>
        <div class="side-bar">
            <p>this is in the side-bar area</p>
        </div>
        <div class="main">
            <p>this is in the main area</p>
        </div>
    </div>
</body>
</html>
