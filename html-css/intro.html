<!-- 
 
    HypterText Markup Language is the syntax used to build webpages. It is a markup language 
    that is read by the browser and which is then used to render content on your page. It is one
    of three primary tools used by the browser to create functional webpages:
    - HTML: visual component
    - CSS: styling component
    - JavaScript: action component

    NOTE: Kiro and other VSCode forks (and VSCode itself) have a tool called Emmet Abbreviations.
    These are shortcuts to produce commonly used snippets of code/text. When setting up a web page
    for the first time you can use "!" to get the starting pieces of a web page generated for you.
 
-->

<!-- this first markup tells the browser what kind of data it has -->
<!DOCTYPE html>

<!-- 
    All content in an HTML file goes inside "tags": these are the <> wrapped text that tell
    the browser what "elements" you want on the web page. Most elements on a web page have an
    opening and closing tag (see html, head, title, body below) but there are also "void tags", which
    only have a single tag (see meta below)

    quick reference:
    - tag = the <> enclosed text that is used to tell the browser the page should have an element
    - element = the actual content of the page, the thing rendered by the browser
-->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
    
        Make sure the title of your webpage explains the 
        app the user is interacting with
    -->
    <title>Example HTML</title>
</head> <!-- this is the closing tag for the head element: note the / -->
<body>
    <!-- 
        Header elements are good options for telling users what section of the page
        they are looking at
    -->
    <!-- side note: ctrl + / creates/removes a comment on a line -->
    <h1>This is my main header on the page!!!!!!</h1>
    <!-- if you ever need normal text content use the p element -->
    <p>This is some normal text content that also has <span>an inline span</span> to showcase inline elements</p>

    <!-- 
        Note that even if you put the p element on the same line as the header element the p element still gets rendered below the
        header: this is because both the header and p element are "block" elements. All elements are either block or inline:
        - block elements: these elements want to utilize all the horizontal space available to them
        - inline elements: these elements only take up as much space as is needed for them to be rendered in the viewport. These are 
                           typically used to make targeted changes to content or they are elements that are utilized alongside
                           other inline elements
    -->
    
    <!-- 
        There are some inline elements that provide useful structures to your web page, such as buttons and inputs. These are the tools
        that allow you to take in user actions for common actions, such as logging in or creating resources, and these tools provide
        a consitent API for facilitating these actions
    -->
    <!-- 
    
        Input elements are the basic way to get user input: note the type "attribute" of the element. Attributes are how you provide
        attributes to your elements: these attributes can be functional (like the type attribute below), they can provide metadata about
        the element, and they can provide targeting/identification information about the element. In the input below the type attribute
        will tell the browser how to render the input and what type of data it should accept
    
        -->
    <input type="text"> <!-- use ctrl + space to get intellisense inside the quotes to see the different input types -->
</body>
</html>
