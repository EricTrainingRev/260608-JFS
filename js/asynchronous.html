<script>
    /*
        JavaScript is executed line by line as an interpreted language. Parallel execution is not the norm
        for JS scripts, but asynchronous code is very standard. Because there is always some wait time when
        HTTP requests are made in the browser for data, there has to be a way to allow for your web pages to
        continue loading their data and providing their functionality while you wait for the data from your
        request. JavaScript's solution for this is Promises. A Promise is an object that represents the future
        data you are expecting to utilize and can be created and referred back to by your interpreter when the
        data is finally acquired (think the response of an HTTP request is recieved).

        NOTE: in modern JS you typically will not manually interact with promises: you would use the async and
        await keywords to have your promises manually handled for you. This example is here simply to show you
        a bit of how Promises work, not how to utilize them
    */

    function manualPromise(){
        console.log("Script starting")

        // Promises can be "resolved" or "rejected" depending on whether or not you get your data back
        const ourPromise = new Promise(
            (resolve, reject)=>{
                const isResolved = true;
                let message;
                const TIMEOUT = 2000;
                if(isResolved){
                    message = "The promise resolved";
                    setTimeout(
                        ()=> resolve(message),
                        TIMEOUT
                    );
                } else {
                    message = "The promise is rejected";
                    setTimeout(
                        ()=>reject(message),
                        TIMEOUT
                    );
                }
            }
        );

        console.log("Promise created")

        console.log("calling then/catch of Promise");
        ourPromise
            .then(
                resolveData => console.log(resolveData)
            )
            .catch(
                errorData => console.log(errorData)
            )
            .finally(
                ()=> console.log("This will always trigger")
            );

        console.log("End of script");        
    }

    /*
        The modern way of doing async programming in JavaScript is to use async functions with the await
        keyword inside of them. the async keyword tells JavaScript you are doing async programming, but it also
        forces your function to return a promise

        Inisde of the function, where the actual async code is written, you can use the "await" keyword to
        automatically unpack your promise: the resolve code is returned on success, the reject code returned
        on failure
    */
    async function aBetterWay(headerElement){
        /*
            A good example of async programming in action is the fetch function: it lets you make an
            HTTP request and it returns a promise that must be unpacked in order to access the response
            data. We COULD manually unpack the response, or we could use the await keyword and have
            JavaScript handle it for us
        */
       const response =  await fetch("https://pokeapi.co/api/v2/pokemon/pikachu");
       // to access the body of the response you must await it using the proper function based on the data
       const responseBody = await response.json();
       headerElement.innerText = responseBody.name;
    }

    console.log("Script start");
    const htmlBody = document.querySelector("body");
    const h1Element = document.createElement("h1");    
    aBetterWay(h1Element);
    h1Element.innerText = "Waiting for Pokemon Data";    
    htmlBody.appendChild(h1Element);
    console.log("Script end");

    const responsePromise = fetch("some url");

</script>
