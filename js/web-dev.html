<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Note: in the js we change the text content which actually destroys the span element -->
    <p>This is the <span>initial</span> text</p>
    <div>
        <p>this paragraph has <span id="firstSpan">a span</span> we do not destroy</p>
    </div>
    <div>
        <p id="innerParagraph">this p is in <span id="secondSpan">a div</span> container</p>
    </div>
</body>
<script>
    /*
        In order to interact with web elements in the DOM we need a way to
        reference those elements. To do this we must choose a selector that
        will be a valid selector for the element
    */

    /*

        for the p element with initial text we want to change we can target it via an element selector. There are
        two primary ways of finding an element:
        - getElement methods: these are helper methods to query your elements
        - querySelector: these methods let you provide your own selector to find the element/s you are looking for

    */
    const pElement = document.querySelector("p"); // this returns the first instance of an element that matches the selector
    pElement.textContent = "This is the new text content"; // textContent gives us access to the text of the element
    // note: changing the text content above is destroying the span we hard-coded into the p element
    const div = document.querySelector("div");
    console.log(div.innerHTML);
    console.log(div.innerText);

    const innerP = document.getElementById("innerParagraph");
    console.log(innerP.innerHTML);
    console.log(innerP.innerText);

    const innerSpan = innerP.querySelector("span");
    console.log(innerSpan.innerHTML);
    console.log(innerSpan.innerText);

    const theStillPresentSpans = document.getElementsByTagName("span");
    console.log(theStillPresentSpans);
    console.log(theStillPresentSpans[0]);
    console.log(theStillPresentSpans.secondSpan);

    const firstSpan = document.getElementById("firstSpan");
    const secondSpan = document.getElementById("secondSpan");
    console.log(firstSpan);
    console.log(secondSpan);

</script>
</html>
