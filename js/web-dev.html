<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .myClass {
            color: purple;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
            border: 4px lightgreen groove;
        }
    </style>
</head>
<body>
    <!-- Note: in the js we change the text content which actually destroys the span element -->
    <p>This is the <span>initial</span> text</p>
    <div>
        <p>this paragraph has <span id="firstSpan">a span</span> we do not destroy</p>
    </div>
    <div>
        <p id="innerParagraph">this p is in <span id="secondSpan">a div</span> container</p>
    </div>
    <div id="constructionZone">
        <!-- We will dynamically add content here via JS -->
    </div>
</body>
<script>
    /*
        In order to interact with web elements in the DOM we need a way to
        reference those elements. To do this we must choose a selector that
        will be a valid selector for the element
    */

    /*

        for the p element with initial text we want to change we can target it via an element selector. There are
        two primary ways of finding an element:
        - getElement methods: these are helper methods to query your elements
        - querySelector: these methods let you provide your own selector to find the element/s you are looking for

    */
    const pElement = document.querySelector("p"); // this returns the first instance of an element that matches the selector
    pElement.textContent = "This is the new text content"; // textContent gives us access to the text of the element
    // note: changing the text content above is destroying the span we hard-coded into the p element
    const div = document.querySelector("div");
    console.log(div.innerHTML); // DO NOT CHANGE innerHTML IF USER INPUT IS PART OF THE CHANGE
    console.log(div.innerText); // if changing text prefer innerText when possible

    // here we use the getElementById to access our element
    const innerP = document.getElementById("innerParagraph");
    console.log(innerP.innerHTML);
    console.log(innerP.innerText);

    // note we can query for elements within other elements: this changes the starting point of the search
    const innerSpan = innerP.querySelector("span");
    console.log(innerSpan.innerHTML);
    console.log(innerSpan.innerText);

    // we can return an HTMLCollection that lets us access elements multiple ways within the collection
    const theStillPresentSpans = document.getElementsByTagName("span");
    console.log(theStillPresentSpans);
    // index is supported
    console.log(theStillPresentSpans[0]);
    // sometimes a key is supported
    console.log(theStillPresentSpans.secondSpan);

    // ideally, your elements should all have a way to be identified uniquely for ease of access
    const firstSpan = document.getElementById("firstSpan");
    const secondSpan = document.getElementById("secondSpan");
    console.log(firstSpan);
    console.log(secondSpan);


    /*
        We have the ability to add resources into the DOM as well as pulling
        them out: in order to add elements in you first need to decide where
        the element is going to exist within the DOM (typically by making a
        reference to the element you want as its parent), then you create
        the element in your script, then you add it into the DOM
    */

    function createElement(){
        // Step 1: determine the parent
        const constructionZone = document.getElementById("constructionZone");

        // Step 2: create the element/s we want to add to the page
        const newParagraph = document.createElement("p");
        newParagraph.innerText = "We added this via JavaScript!";
        newParagraph.id = "newParagraph";
        newParagraph.classList.toggle("myClass");
        // newParagraph.classList.toggle("myClass"); uncomment if you want to remove the class


        function alertUser(){
            alert("The element was clicked");
        }

        /*
            To add functionality to your elements you use event listeners. You need to provide the
            following arguments to the addEventListener function:
            - event -> what event is the element listening for
            - action -> what code (the callback function) needs to be executed when the event triggers
            - (optional) event propigation direction -> when multiple elements are listening for the same event
                                                        trigger, do they execute from the top of the DOM node tree
                                                        down, or do they start at the bottom of the tree and work
                                                        their way up?
        */
        newParagraph.addEventListener("click", alertUser, true);
        // newParagraph.removeEventListener("click", alertUser); this removes the event listener

        // Step 3: add the new element as a child to the parent
        constructionZone.appendChild(newParagraph);        
    }


    const constructionZone =  document.getElementById("constructionZone");
    /*
        Here we are using an arrow function as our callback: this is quick and easy to add, but it makes
        it incredibly difficult at best to remove the event listener. If you know you need to add/remove
        event listeners you should write the callback as a standard function, otherwise an arrow function
        works just fine

        Note that both the div and p elements' event listeners have a "true" added as a third parameter:
        this tells the browser they are in "capture" mode so event propogation will start with the div, then
        go to the p. if you want it to "bubble" from the p to the div you remove the true parameter

        NOTE: both elements must have the true argument, or event propigation will bubble by default
    */
    constructionZone.addEventListener("click", event => alert("div event triggered"), true)
    createElement();
    const newRefToParagraph = document.getElementById("newParagraph");



</script>
</html>
