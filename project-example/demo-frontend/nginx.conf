server {
    # Listen on port 80 for incoming HTTP requests
    listen 80;

    # Accept requests addressed to any hostname
    server_name localhost;

    # Serve static files from this directory
    root /usr/share/nginx/html;

    # Default file to serve when a directory is requested
    index index.html;

    location / {
        # Try to serve the requested file directly ($uri),
        # then as a directory ($uri/),
        # then fall back to index.html for Angular client-side routing
        try_files $uri $uri/ /index.html;
    }
}
